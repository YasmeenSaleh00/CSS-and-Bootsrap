<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .bg-black {
        background-color: #1a1e26 !important;
        color: #cccccc;
      }
      .border-black {
        border-color: #333 !important;
      }
      .bg {
        background-color: #1a1e26 !important;
      }
      .mw {
        max-width: 600px !important;
      }
      .w-100 {
        width: 100% !important;
      }
      .bg-dark {
        background-color: #c1cce110 !important;
      }
      .start-0 {
        left: 12px !important;
        top: 50% !important;
        transform: translateY(-50%) !important;
        color: #888 !important;
      }
      .search input:focus + i {
        display: none;
      }
      .search input:focus {
        border: 1px solid #888;
        box-shadow: 1px 1px 3px #888;
      }
      .me-5 {
        margin-right: 40px !important;
      }
      .notification i:hover {
        color: #888888a1;
      }
      .min-w {
        min-width: 18px !important;
        height: 18px !important;
        font-size: 11px !important;
      }
      .top-0 {
        top: -1px !important;
      }
         .search input:focus + i {
        display: none;
      }
      .search input:focus {
        border: 1px solid #888 !important;
        box-shadow: 1px 1px 3px #888 !important;
      }
      .start-100{
       right: 26px !important; 
      }
      .bg-primary{
        background-color:#c1cce110 !important ;
      }
        .side .side-content ul li {
        background-color: #1a1e26;
        padding: 10px;
        border-radius: 5px;
        transition: 0.5s;
        cursor: pointer;
        
      }
      .g-5{
        gap: 20px !important;
      }
       .side .side-content ul li:hover {
        background-color: #c1cce110;
        transform: translateY(-5px);
      }
         .side .side-content ul .selected {
        background-color: #444141;
        box-shadow: 0px 1px 10px 10px #1a1e26;
      }
    </style>
  </head>
  <body class="bg-black">
    <div class="container-fluid p-0">
      <header
        class="border-bottom border-black bg py-2 px-4 d-flex align-items-center justify-content-between gap-3"
      >
       <div class="d-none"><i class="fa-solid fa-bars "></i></div>
        <div class="logo">
          <h2 class="fs-4 m-0">Dashboard</h2>
        </div>

        <div
          class="search position-relative flex-grow-1 mw-50"
          style="max-width: 500px"
        >
          <input
            type="search"
            placeholder="      Search...."
            class="form-control rounded-5 border-0 bg-dark text-white py-2 shadow-none"
          />
          <i class="fa-solid fa-magnifying-glass position-absolute start-0"></i>
        </div>

        <div class="d-flex align-items-center gap-4">
          <div class="user d-flex align-items-center gap-2">
            <img
              src="/Images/images.png"
              alt="user"
              width="38"
              height="38"
              class="rounded-circle border border-secondary"
            />
            <span class="d-none d-lg-inline fw-semibold">Jane Smith</span>
          </div>
          <div class="notification position-relative">
            <i class="fa-solid fa-bell fs-5 cursor-pointer"></i>
            <span
              class="bg-danger min-w rounded-circle position-absolute top-0 start-100 translate-middle d-flex justify-content-center align-items-center"
              style="font-size: 10px; width: 18px; height: 18px"
            >
              2
            </span>
          </div>
        </div>
      </header>
     <!-- side -->

      <div class="side bg-primary col-2 p-2  ">
        <div class="side-content">
          <ul class="list-unstyled d-flex flex-column g-5 p-3">
            <li class="selected ">
              <i class="fa-solid fa-bag-shopping me-2"></i> Dashbord
            </li>
            <li><i class="fa-solid fa-chart-line me-2"></i> Analytics</li>
            <li><i class="fa-solid fa-message me-2"></i>Messages</li>
            <li><i class="fa-solid fa-gear me-2"></i>Settings</li>
          </ul>
        </div>
      </div>
      <!-- finish side -->
       
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
